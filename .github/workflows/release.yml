name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Write tap deploy key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}" > ~/.ssh/tap_deploy_key
          chmod 600 ~/.ssh/tap_deploy_key
          echo "TAP_DEPLOY_KEY_FILE=$HOME/.ssh/tap_deploy_key" >> "$GITHUB_ENV"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          # GITHUB_TOKEN creates the release on this repo; the formula is pushed
          # to curtis1215/homebrew-tap over SSH using the deploy key above.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_DEPLOY_KEY_FILE: ${{ env.TAP_DEPLOY_KEY_FILE }}
